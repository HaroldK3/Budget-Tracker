<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Expenses</title>
    <link rel="icon" href="">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <script src="js/script.js" defer></script>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="edit.html">Expenses</a></li> <!--this one will allow user to add/edit expenses-->
            <li><a href="visual.html">Visuals</a></li>
            <button type="button" id="logoutButton">Log Out</button> <!--style this to be moved to the very right-->
        </ul>
    </nav>
    <div>
        <p>
            <br><br><br><br><br>Is this transaction income? 
            <input type="radio" id="yes" name="agreement" value="yes">
            <label for="yes">Yes</label>
            <input type="radio" id="no" name="agreement" value="no">
            <label for="no">No</label>
            <br><br>
            
            Please select a category for the transaction you are adding to your budget
            <select id="category_dropdown">
                <option value="">Select a category from the dropdown</option> 
            </select>
            <br><br>
            Add a new category:
            <br>
            Category name: <input type="text" id="newCategoryName">
            <br><br>
            Category type:
            <select id="newCategoryType">
                <option value="">Select a type</option>
                <option value="income">Income</option>
                <option value="need">Need</option>
                <option value="want">Want</option>
                <option value="savings_debt">Savings/Debt</option>
            </select>
            <button type="button" id="addCategoryButton">Add Category</button>

            <br><br>
            Enter the amount here: <input type="text" id="amount"><br>
            Enter a description of the charge: <input type="text" id="description">
            <br>

            <button type="button" id="addTransactionButton">Add Transaction</button>

        </p>
    </div>
</body>
</html>
